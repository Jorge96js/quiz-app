<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Poné a prueba tus conocimientos de Gaming, Anime y Desarrollo Web con esta Trivia interactiva">
    <meta name="keywords" content="Quiz, Trivia, Videojuegos, Anime, JavaScript, Binaraweb, Programación">
    <meta name="author" content="Binaraweb">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="/src/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><polygon points=%2250 5, 95 27, 95 73, 50 95, 5 73, 5 27%22 fill=%22%23007bff%22/></svg>">

    <title>Quiz App</title>
</head>
<body>

    <div class="contenedor">
            <div class="categoria" id="categoria">
                <b>Categoria</b>
            </div>
            <div class="info">
                <div>Correctas: <span id="correctas">0</span></div>
                <div>incorrectas: <span id="incorrectas">0</span></div>
            </div>
        <div class="encabezado">
            <div class="pregunta" id="pregunta">
                <b>Pregunta</b>
            </div>
            <img src="" alt="imagen" class="imagen" id="imagen">
        </div>

        <div class="grid-buttons">
            <div class="btn" id="btn1">Opcion 1</div>
            <div class="btn" id="btn2">Opcion 2</div>
            <div class="btn" id="btn3">Opcion 3</div>
            <div class="btn" id="btn4">Opcion 4</div>
        </div>
    </div>

    <script src="/src/javascript/main.js"></script>
</body>
</html>
